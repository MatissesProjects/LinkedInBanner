name: LinkedIn Banner Sync

on:
  schedule:
    - cron: '0 0 1 1 *' # Dynamically updated by script
  workflow_dispatch: # Allow manual triggers

# Allow the script to commit and push changes back to the repo
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Required for git push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Banner Sync
        env:
          # Secrets
          LI_AT_COOKIE: ${{ secrets.LI_AT_COOKIE }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTIONS: "true"
          
          # Action Context
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python src/main.py
